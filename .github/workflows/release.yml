name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Linux bundles
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      ARCH: x86_64
      NO_STRIP: "true"

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          import fs from "node:fs";

          const tag = process.env.RELEASE_TAG ?? "";
          if (!/^v\d+\.\d+\.\d+$/.test(tag)) {
            throw new Error(`Release tag must use vMAJOR.MINOR.PATCH, received: ${tag}`);
          }

          const expected = tag.slice(1);
          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargoManifest = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoManifest.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const versions = { packageVersion, tauriVersion, cargoVersion };

          for (const [source, version] of Object.entries(versions)) {
            if (version !== expected) {
              throw new Error(`${source} is ${version ?? "missing"}; expected ${expected} from ${tag}`);
            }
          }
          NODE

      - name: Validate frontend
        run: |
          pnpm run check
          pnpm test -- --run

      - name: Validate Rust
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build bundles and publish GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: Markdown Thing v__VERSION__
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: --bundles deb,rpm,appimage
